#
# default.yaml: Config that applies to all clusters and environments
#

platform:
  # Default base domain for the platform
  baseDomain: org.internal
  # Overall platform release version (used as targetRevision for all apps + config)
  version: main

  # Global platform Argo CD config
  # ── Reserved for a future argo-cd-config chart ────────────────────────────
  # Keys like instanceName, rbac, controller tuning, redis, repo replicas are
  # NOT currently read by any template. Do not enable them here until a
  # platform-apps template or helm-catalog chart consumes them.
  # ──────────────────────────────────────────────────────────────────────────
  argocd:
    # Global sync policy for all platform apps — read by platform-apps/_helpers.tpl.
    # Overridden per environment in clusters/<type>/common.yaml (dev/preprod/prod/hub).
    # Autosync is disabled here so new environments default to safe manual sync
    # until a common.yaml explicitly enables it.
    syncPolicy:
      syncOptions:
        - Validate=true
        - CreateNamespace=false
        - RespectIgnoreDifferences=true
        - ServerSideApply=true

  # Catalog of platform Argo CD apps — enable/configure per layer.
  # repoURL/path/targetRevision are baked into each app template; override here only if needed.
  argocdApps:
    # On-cluster ConfigMap showing the fully merged platform-config values for this cluster.
    # Enabled by default — purely informational, no side effects, useful on all cluster types.
    # Read with: oc get configmap platform-config-snapshot -n openshift-gitops -o jsonpath='{.data.values\.yaml}'
    platformConfigSnapshot:
      enabled: true
      destination:
        namespace: openshift-gitops

    # ArgoCD instance configuration — patches the operator-managed ArgoCD CR via SSA.
    # Sets RBAC policy (platformGroup + adGroupName), component resource limits, and
    # resourceExclusions. Also creates namespace admin RoleBindings in openshift-gitops.
    # Enabled by default — every cluster should have its ArgoCD instance configured.
    argocdInstanceConfig:
      enabled: true
      destination:
        namespace: openshift-gitops

    advancedClusterSecurity:
      enabled: false
      destination:
        namespace: stackrox

    alertmanagerConfig:
      enabled: true

    # Cluster console banner — shows environment type and group in the OCP console top bar.
    # Colour is controlled by clusterTheme.banner.backgroundColor in each common.yaml.
    clusterBannerConfig:
      enabled: true

    rosaMachinePool:
      enabled: false
      destination:
        namespace: openshift-machine-api

    # Stakater Reloader — watches ConfigMaps/Secrets and rolls Deployments on change.
    # Spoke clusters only (guarded by clusterType != hub in the template).
    # Enable per cluster in clusterdef.yaml. targetRevision overrides the chart version default.
    stakaterReloader:
      enabled: false
      destination:
        namespace: stakater-reloader

    # Red Hat DevSpaces — browser-based VS Code workspaces for development teams.
    # Spoke clusters only (guarded by clusterType != hub in the template).
    # Enabled for all dev clusters in clusters/dev/common.yaml.
    # Requires devspacesOperator to be installed first (handled by operator-installer).
    devspacesConfig:
      enabled: false
      destination:
        namespace: openshift-devspaces

  # Default config for the operator installer app
  operatorInstaller:
    repoURL: https://github.com/redhat-cop/helm-charts.git
    path: charts/operators-installer
    targetRevision: main
    approveManualInstallPlanViaHook: true
    installPlanApproval: Manual

# ── ArgoCD instance configuration ────────────────────────────────────────────
# Applied to the operator-managed ArgoCD CR via SSA by the argocd-instance chart.
# Override resource limits per environment in clusters/<type>/common.yaml.
# adGroupName flows in automatically from clusterdef.yaml (no need to set it here).
argocdInstance:
  rbac:
    # Platform-wide Argo CD admin group — present on every cluster.
    # Harden by removing the system:cluster-admins / cluster-admins lines later.
    platformGroup: PLATFORM_ADMINS
  resources:
    # Mirrors operator defaults — change in common.yaml to tune per environment.
    server:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    applicationSet:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
    repo:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
    controller:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 1Gi
    redis:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi

# Global operator catalog — enable/override per layer
operators:
  advancedClusterManagementOperator:
    enabled: false
    name: advanced-cluster-management
    appname: advanced-cluster-management-operator
    destination:
      namespace: open-cluster-management
    createOperatorGroup: true
    operatorGroupName: open-cluster-management
    createNamespace: true
    targetOwnNamespace: true
    channel: release-2.14
    csv: advanced-cluster-management.v2.14.0
    source: redhat-operators

  certManagerOperator:
    enabled: true
    name: openshift-cert-manager-operator
    appname: cert-manager-operator
    destination:
      namespace: cert-manager-operator
    createOperatorGroup: true
    operatorGroupName: cert-manager-operator
    createNamespace: true
    targetOwnNamespace: true
    channel: stable-v1
    csv: cert-manager-operator.v1.19.0
    source: redhat-operators

  kubecostOperator:
    enabled: false
    name: kubecost-operator
    appname: kubecost-operator
    destination:
      namespace: kubecost
    createOperatorGroup: true
    operatorGroupName: kubecost
    createNamespace: true
    targetOwnNamespace: true
    channel: stable
    csv: kubecost-operator.v3.2.0
    source: community-operators

  openshiftTempoOperator:
    enabled: false
    name: tempo-operator
    appname: tempo-operator
    destination:
      namespace: openshift-tempo-operator
    createOperatorGroup: true
    operatorGroupName: openshift-tempo-operator
    createNamespace: true
    targetOwnNamespace: false
    channel: stable
    csv: tempo-operator.v0.20.0-3
    source: redhat-operators

  opentelemetryOperator:
    enabled: false
    name: opentelemetry-operator
    appname: opentelemetry-operator
    destination:
      namespace: openshift-opentelemetry-operator
    createOperatorGroup: true
    operatorGroupName: openshift-opentelemetry-operator
    createNamespace: true
    targetOwnNamespace: false
    channel: stable
    csv: opentelemetry-operator.v0.0.0
    source: redhat-operators

  # Red Hat DevSpaces operator — installed via OLM, enables the CheCluster CR API.
  # Disabled globally; enabled for all dev clusters in clusters/dev/common.yaml.
  devspacesOperator:
    enabled: false
    name: devspaces
    appname: devspaces-operator
    destination:
      namespace: openshift-operators
    createOperatorGroup: false
    operatorGroupName: openshift-operators
    createNamespace: false
    targetOwnNamespace: false
    channel: stable
    csv: devspacesoperator.v3.28.2
    source: redhat-operators
