#
# clusterdef.yaml — hub eng cluster (eu-west-1)
#
# One folder = one cluster. This file is the fourth and final merge layer:
#   default.yaml → region.yaml → clusters/hub/common.yaml → THIS FILE
#
# ACM label applied at import:
#   platform/clusterGroup=eng  platform/clusterType=hub  platform/region=eu-west-1
#
# NOTE: This is local-cluster in ACM — the hub manages itself. The hub-self-management
#       ApplicationSet injects clusterType/clusterGroup/region via extraValues so these
#       paths resolve correctly even though local-cluster has no generator .metadata labels.
#

clusterGroup: eng
team: eng

# AD / LDAP authentication for hub console access
adGroupName: OPENSHIFT_GROUPS_OCP-HUB
ldapAccount: svc_ocp_ad_hub

# Region this cluster lives in. Must match a directory under platform-config/regions/
region: eu-west-1

# Unique cluster name — appears in Argo CD and ACM dashboards
clusterName: hub-eng-eu-west-1

# OCP version tracking (informational — upgrades managed via ROSA service / ACM)
ocpInstalledVersion: 4.20.0
ocpCurrentVersion: 4.20.0

# ── Argo CD sync policy ───────────────────────────────────────────────────────
# Hub syncs with prune + selfHeal enabled. Hub apps (ACS, alertmanager, operators)
# are managed by GitOps — drift is corrected automatically.
platform:
  argocd:
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - Validate=true
        - CreateNamespace=false
        - RespectIgnoreDifferences=true
        - ServerSideApply=true

  # ── argocdApps overrides ──────────────────────────────────────────────────
  # Override globally-enabled apps for this cluster by following this pattern.
  # IMPORTANT: always keep at least one real (uncommented) key beneath argocdApps:
  # if this block exists — a bare argocdApps: with only comments parses as null
  # in YAML and silently wipes all inherited values from default.yaml/common.yaml.
  argocdApps:
    # Stakater Reloader is a spoke capability — not needed on the hub.
    # This entry also serves as a reference for how to suppress any globally-enabled app.
    stakaterReloader:
      enabled: false

    # TODO: add these when templates exist in platform-apps
    # openshiftAuth:
    #   targetRevision: main
    # ingressApiCerts:
    #   path: replace-ingress-api-certs
    #   targetRevision: main
    # grafana:
    #   targetRevision: main

# ── Advanced Cluster Security ─────────────────────────────────────────────────
# clusterName is registered in the ACS Central init bundle generated on first sync.
# Override below if this hub cluster needs a different ACS identifier.
stackrox:
  clusterName: hub-eng

# ACS init bundle clusterName override example (uncomment if this cluster differs):
# stackrox:
#   clusterName: hub-eng-eu-west-1

# ── Cluster banner override ───────────────────────────────────────────────────
# Overrides the default "HUB | eng" text set in hub/common.yaml.
# colour (purple) is inherited from hub/common.yaml — only the text is changed here.
clusterTheme:
  banner:
    text: "eng hub cluster"
