#
# groupdef.yaml: Config specific to the eng group on hub clusters
#

clusterGroup: eng
team: eng
adGroupName: OPENSHIFT_GROUPS_OCP-HUB
ldapAccount: svc_ocp_ad_hub

platform:
  argocd:
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - Validate=true
        - CreateNamespace=false
        - RespectIgnoreDifferences=true
        - ServerSideApply=true

  argocdApps:
    openshiftAuth:
      targetRevision: main

    ingresApiCerts:
      path: replace-ingress-api-certs
      targetRevision: main

    grafana:
      targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - Validate=true
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=false

# ACS cluster init bundle config — clusterName referenced by the ACS app
stackrox:
  clusterName: hub-eng
