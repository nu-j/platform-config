#
# common.yaml: Config common to all management clusters
#
# Applied to ALL clusters of clusterType=management. This is the third layer in the merge chain:
#   default.yaml → region.yaml → THIS FILE → clusters/management/<group>/clusterdef.yaml
#

clusterType: management

platform:
  argocdApps:
    # ACS is the primary security tooling on management clusters
    advancedClusterSecurity:
      enabled: true
      values:
        stackrox:
          namespace: stackrox
          analyzer:
            resources:
              limits:
                cpu: 500m
              requests:
                cpu: 100m

    # Alertmanager config applies to all clusters including management
    alertmanagerConfig:
      enabled: true

    # ROSA MachinePools do not apply to management clusters
    rosaMachinePool:
      enabled: false

    # TODO: no template yet — uncomment when platform-apps template is added
    # clusterOpsSa:
    #   enabled: true
    # clusterTasks:
    #   enabled: true

# Operators installed on management clusters
operators:
  # ACM is already installed on the management cluster — managed outside this chart
  advancedClusterManagementOperator:
    enabled: false
  certManagerOperator:
    enabled: true
  openshiftTempoOperator:
    enabled: false
  opentelemetryOperator:
    enabled: true

clusterTheme:
  banner:
    color: "#ffffff"
    backgroundColor: "#6f42c1"  # purple — distinguishes management from all spoke environments

# ── ArgoCD instance overrides ─────────────────────────────────────────────────
# The management cluster runs more ApplicationSets and manages more clusters — consider
# bumping applicationSet and controller limits. adGroupName flows in from clusterdef.yaml.
