#
# common.yaml — dev environment defaults
#
# Applied to ALL clusters of clusterType=dev. This is the third layer in the merge chain:
#   default.yaml → region.yaml → THIS FILE → clusters/dev/<group>/clusterdef.yaml
#
# Override any of these keys in clusterdef.yaml for cluster-specific behaviour.
#

clusterType: dev

# ── Argo CD sync policy ───────────────────────────────────────────────────────
# Controls how the root Application (and cascaded child Applications) sync.
# dev: auto-sync with selfHeal and prune enabled — safe to remove unused resources.
platform:
  argocd:
    syncPolicy:
      automated:
        prune: true      # resources removed from git are deleted from the cluster
        selfHeal: true   # drift from git is corrected automatically
      syncOptions:
        - Validate=true
        - CreateNamespace=false
        - RespectIgnoreDifferences=true
        - ServerSideApply=true

  # ── Operator installer ────────────────────────────────────────────────────
  # Dev: install plans are approved automatically — no manual gate needed.
  # Override to Manual in clusterdef.yaml for any cluster requiring change control.
  operatorInstaller:
    installPlanApproval: Automatic
    approveManualInstallPlanViaHook: false

  # ── App feature flags ─────────────────────────────────────────────────────
  # Enable / disable spoke-specific applications for all dev clusters.
  # Individual clusters can override these in their clusterdef.yaml.
  argocdApps:
    rosaMachinePool:
      enabled: true        # ROSA worker node pool management
    # TODO: no template yet — uncomment when platform-apps template is added
    # clusterOpsSa:
    #   enabled: true
    # clusterTasks:
    #   enabled: true
    # kubecostConfig:
    #   enabled: true      # cost visibility (requires kubecostConfig template)
    genericHelmchartPipeline:
      enabled: false
    grafanaCustomRoles:
      enabled: false
    # TODO: no template yet — uncomment when platform-apps template is added
    # tektonInfraContainersPipeline:
    #   enabled: true

    # DevSpaces — enabled for all dev clusters; disable per-cluster in clusterdef.yaml.
    devspacesConfig:
      enabled: true

# ── Operators ────────────────────────────────────────────────────────────────
# Operator subscriptions installed on all dev clusters.
# Set enabled: false in clusterdef.yaml for any cluster that does not need them.
operators:
  kubecostOperator:
    enabled: true
  openshiftTempoOperator:
    enabled: true
  opentelemetryOperator:
    enabled: true
  # DevSpaces operator — required for devspacesConfig to work.
  # Installed via OLM; disable per-cluster in clusterdef.yaml if DevSpaces is not needed.
  devspacesOperator:
    enabled: true

# ── Cluster banner ────────────────────────────────────────────────────────────
# Green banner signals a non-production environment at a glance in the OCP console.
clusterTheme:
  banner:
    color: "#ffffff"
    backgroundColor: "#28a745"

# ── ArgoCD instance overrides ─────────────────────────────────────────────────
# Dev clusters typically run at full resource limits — uncomment and lower if cost
# is a concern. adGroupName flows in from clusterdef.yaml automatically.
# argocdInstance:
#   resources:
#     server:
#       limits: { cpu: 250m, memory: 128Mi }
#       requests: { cpu: 125m, memory: 64Mi }
