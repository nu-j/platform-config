#
# clusterdef.yaml: Config specific to the arkham-dev-kilkenny ROSA cluster
#

clusterName: arkham-dev-kilkenny
region: kilkenny

# OCP version tracking (informational — upgrades managed via ROSA service)
ocpInstalledVersion: 4.20.14
ocpCurrentVersion: 4.20.14

# ROSA day-2 MachinePool — manages worker node pools via machine.openshift.io/v1beta1
# Enable via platform.argocdApps.rosaMachinePool in groupdef/common
rosa:
  machinePools:
    platform:
      enabled: true
      name: platform
      replicas: 2
      # Required: Infrastructure.status.infrastructureName from this cluster
      # oc get infrastructure cluster -o jsonpath='{.status.infrastructureName}'
      clusterID: REPLACE_WITH_CLUSTER_INFRASTRUCTURE_ID
      labels:
        node-role: platform

# Traditional OpenShift compute config placeholder
# (not applicable to ROSA — node sizing is controlled via MachinePools above
#  and instance types set in the ROSA service / MachinePool spec)
compute:
  worker:
    # Placeholder — traditional OCP IPI/UPI install-config fields would go here
    name: worker
  infra:
    # Placeholder — traditional OCP IPI/UPI install-config fields would go here
    name: infra
