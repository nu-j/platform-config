#
# common.yaml — preprod environment defaults
#
# Applied to ALL clusters of clusterType=preprod. This is the third layer in the merge chain:
#   default.yaml → region.yaml → THIS FILE → clusters/preprod/<group>/clusterdef.yaml
#
# Override any of these keys in clusterdef.yaml for cluster-specific behaviour.
#

clusterType: preprod

# ── Argo CD sync policy ───────────────────────────────────────────────────────
# preprod mirrors dev behaviour: auto-sync with prune enabled.
# This keeps preprod clean and representative of what prod will receive.
# If you want safer behaviour closer to prod, set prune: false here.
platform:
  argocd:
    syncPolicy:
      automated:
        prune: true      # resources removed from git are deleted from the cluster
        selfHeal: true   # drift from git is corrected automatically
      syncOptions:
        - Validate=true
        - CreateNamespace=false
        - RespectIgnoreDifferences=true
        - ServerSideApply=true

  # ── App feature flags ─────────────────────────────────────────────────────
  argocdApps:
    rosaMachinePool:
      enabled: true
    # TODO: no template yet — uncomment when platform-apps template is added
    # clusterOpsSa:
    #   enabled: true
    # clusterTasks:
    #   enabled: true
    # kubecostConfig:
    #   enabled: true
    # tektonInfraContainersPipeline:
    #   enabled: false    # CI pipelines typically not needed in preprod

# ── Operators ────────────────────────────────────────────────────────────────
operators:
  kubecostOperator:
    enabled: true
  openshiftTempoOperator:
    enabled: true
  opentelemetryOperator:
    enabled: true
  strimziClusterOperator:
    enabled: true

# ── Cluster banner ────────────────────────────────────────────────────────────
# Orange banner distinguishes preprod from dev (green) and prod (red) in the OCP console.
clusterTheme:
  banner:
    color: "#ffffff"
    backgroundColor: "#fd7e14"

# ── ArgoCD instance overrides ─────────────────────────────────────────────────
# Uncomment to tune resource limits for preprod. adGroupName flows in automatically.
# argocdInstance:
#   resources:
#     controller:
#       limits: { cpu: "2", memory: 2Gi }
#       requests: { cpu: 500m, memory: 1Gi }
