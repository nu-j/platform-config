#
# clusterdef.yaml — payments preprod cluster
#
# One folder = one cluster. This file is the fourth and final merge layer:
#   default.yaml → region.yaml → common.yaml → THIS FILE
#
# ACM label applied at import: platform/clusterGroup=payments  platform/clusterType=preprod
#

clusterGroup: payments
team: payments

adGroupName: OPENSHIFT_GROUPS_OCP-PREPROD
ldapAccount: svc_ocp_ad_nonprd

# Region this cluster lives in. Must match a directory under platform-config/regions/
region: eu-west-1

# Unique cluster name — used as the Argo CD cluster identifier
clusterName: payments-preprod-eu-west-1

# OCP version tracking (informational — upgrades managed via ROSA service / ACM)
# ocpInstalledVersion: 4.20.0
# ocpCurrentVersion: 4.20.0

# ── ROSA MachinePool ──────────────────────────────────────────────────────────
# Steps to activate:
#  1. Set enabled: true
#  2. Set clusterID from: oc get infrastructure cluster -o jsonpath='{.status.infrastructureName}'
rosa:
  machinePools:
    platform:
      enabled: false
      name: platform
      replicas: 2
      clusterID: REPLACE_WITH_CLUSTER_INFRASTRUCTURE_ID
      labels:
        node-role: platform

# ── Advanced Cluster Security ─────────────────────────────────────────────────
stackrox:
  clusterName: payments-preprod

# ── App-level overrides ───────────────────────────────────────────────────────
# Override operators for this cluster:
# operators:
#   strimziClusterOperator:
#     enabled: false

# ── platform.argocdApps overrides ────────────────────────────────────────────
# Override globally-enabled apps for this cluster by adding entries below.
# IMPORTANT: always keep at least one real (uncommented) key beneath argocdApps:
# if this block exists — a bare argocdApps: with only comments parses as null
# in YAML and silently wipes all inherited values from default.yaml/common.yaml.
platform:
  argocdApps:
    # Stakater Reloader is disabled globally — enable it on this cluster if needed.
    # This entry also serves as a reference for how to override any argocdApp.
    stakaterReloader:
      enabled: false
