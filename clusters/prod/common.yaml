#
# common.yaml — prod environment defaults
#
# Applied to ALL clusters of clusterType=prod. This is the third layer in the merge chain:
#   default.yaml → region.yaml → THIS FILE → clusters/prod/<group>/clusterdef.yaml
#
# Override any of these keys in clusterdef.yaml for cluster-specific behaviour.
#
# IMPORTANT: prod sync policy defaults are deliberately conservative.
#   - prune: false  — resources are NEVER automatically deleted in prod.
#                     Remove resources manually after verifying no traffic depends on them.
#   - selfHeal: true — drift from git is corrected, but nothing is pruned without human action.
#

clusterType: prod

# ── Argo CD sync policy ───────────────────────────────────────────────────────
platform:
  argocd:
    syncPolicy:
      automated:
        prune: false     # prod: never auto-prune — removals require deliberate manual action
        selfHeal: true   # drift from git is still corrected automatically
      syncOptions:
        - Validate=true
        - CreateNamespace=false
        - RespectIgnoreDifferences=true
        - ServerSideApply=true

  # ── App feature flags ─────────────────────────────────────────────────────
  # Mirror dev/preprod defaults but err on the side of less in prod.
  # Enable in clusterdef.yaml when confident a capability is prod-ready.
  argocdApps:
    rosaMachinePool:
      enabled: true        # ROSA worker node pool management

    # Cluster guardrails — enabled with strictest network isolation for prod.
    clusterGuardrails:
      enabled: true

# ── Cluster guardrails network policy ──────────────────────────────────────────
# prod: enforce namespace isolation — only ingress and monitoring are permitted
# from outside the namespace.
clusterGuardrails:
  networkPolicy:
    denyOtherNamespaces: true   # prod: enforce namespace isolation

# ── Operators ────────────────────────────────────────────────────────────────
# Same operator set as preprod. Disable per cluster in clusterdef.yaml if not needed.
operators:
  kubecostOperator:
    enabled: true
  openshiftTempoOperator:
    enabled: true
  opentelemetryOperator:
    enabled: true

# ── Cluster banner ────────────────────────────────────────────────────────────
# Red banner — unmistakable signal that this is a live production cluster.
clusterTheme:
  banner:
    color: "#ffffff"
    backgroundColor: "#dc3545"  # red
